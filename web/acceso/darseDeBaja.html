<!DOCTYPE html>
<html>
    <head>
        <title>Dandose de baja</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../CSS/styleB.css">
        <script defer type="module" src="../JS/header.js"></script>
        <script defer type="module" src="../JS/forzarLogin.js"></script>
        <script defer type="module" src="../JS/adminPanel.js"></script>
    </head>
    <body class="bgIMG">
        <header class="topNav">
            <a href="#" id="menu" class="fakeLink c1">=</a>
            <section id="dropDown" class="hidden">
                <ul id="adminMenu">
                    <li><a href="index.html" class="betterLinkLite">Menú Principal</a></li>
                    <li><a href="perfil.html" class="betterLinkLite">Perfil</a></li>
                    <li><a href="misIdiomas.html" class="betterLinkLite">Mis Idiomas</a></li>
                    <li><a href="listaIdiomasFull.html" class="betterLinkLite">Lista de Idiomas Disponibles</a></li>
                    <li><a href="../logOut.html" class="betterLinkLite">Cerrar Sesión</a></li>
                </ul>
            </section>
        </header>
        <main class="afterNav">
            <section class="userInfoScreen">
                <h2 class="center">¿Seguro que desea darse de baja en este idioma? ¡Sus notas serán eliminadas!</h2>
                <a href="#" id="borrar" class="introTXT betterLinkDanger center">Darse de baja</a><a href="misIdiomas.html" class="introTXT betterLinkLite center">Cancelar</a>
            </section>
        </main>
        <script>
            const params = new URLSearchParams(document.location.search);
            const idiomaID = params.get("idioma")
            const email = getCookie("email")

            const data = {
                user: email,
                idioma: idiomaID
            }
            
            document.getElementById("borrar").addEventListener("click", (e) => {
                e.preventDefault()
                fetch("http://localhost:9999/languages/user/remove", {method: 'DELETE', headers: {'Content-Type': 'application/json',},body: JSON.stringify(data)}).then((response) => {
                    return response;
                }).then((response) => {
                    fetch("http://localhost:9999/results/filter/" + email + "/" + idiomaID, {method: 'DELETE'}).then((response) => {
                        window.location.replace("./misIdiomas.html")
                    })
                })
            })

            function getCookie(cname) {
                let name = cname + "=";
                let decodedCookie = decodeURIComponent(document.cookie);
                let ca = decodedCookie.split(';');
                for(let i = 0; i <ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                    }
                    if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                    }
                }
                return "";
            }
        </script>
    </body>
</html>
