<!DOCTYPE html>
<html>
    <head>
        <title>Realización de tests</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../CSS/styleB.css">
        <script defer type="module" src="../JS/header.js"></script>
        <script defer type="module" src="../JS/forzarLogin.js"></script>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

        <!-- Don't use this in production: -->
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    </head>
    <body class="bgIMG">
        <header class="topNav">
            <a href="#" id="menu" class="fakeLink c1">=</a>
            <!-- <section id="dropDown" class="hidden">
                <ul>
                    <li><a href="perfil.html" class="betterLinkLite">Perfil</a></li>
                    <li><a href="index.html" class="betterLinkLite">Lista de Idiomas</a></li>
                    <li><a href="../logOut.html" class="betterLinkLite">Cerrar Sesión</a></li>
                </ul>
            </section> -->
            <h1 id="introTXT" class="c2"></h1>
        </header>
        <main class="afterNav">
            <div id="root"></div>
            <script type="text/babel">
                const { useState, useEffect } = React;

                function UnaDeCuatro(preguntas) {
                    const [arrayPreguntas] = useState(() => 
                        shuffle(Object.values(preguntas["preguntas"]))
                    );
                    const [pregunta, setPregunta] = useState(0);
                    const [finished, setFninished] = useState(false);
                    const [idCorrecta, setIdCorrecta] = useState(-1);
                    const [selected, setSelected] = useState(-1);
                    const [aciertos, setAciertos] = useState(0);
                    const [respondido, setRespondido] = useState(false);

                    function shuffle(array) {
                        return [...array].sort(() => Math.random() - 0.5);
                    }

                    function subminHandler(e) {
                        e.preventDefault();
                        
                        if (!respondido && selected > -1) {
                            const formData = new FormData(e.target);
                            const respuesta = formData.get("opt");


                            console.log(selected)
                            console.log(idCorrecta)

                            if (selected === idCorrecta) {
                                setAciertos(prev => prev + 1)
                                document.getElementById(idCorrecta + "L").classList.add("BGgreen")                            
                            } else {
                                document.getElementById(idCorrecta + "L").classList.add("BGgreen")   
                                document.getElementById(selected + "L").classList.add("BGred")   
                            }

                            setRespondido(true)
                        }
                    }

                    function nextQuestion() {

                        const seleccionado = document.querySelector('input[name="opt"]:checked');
                        if (seleccionado) {
                            seleccionado.checked = false;
                            setSelected(-1)
                        }

                        setRespondido(false)

                        if (selected === idCorrecta) {
                            document.getElementById(idCorrecta + "L").classList.remove("BGgreen")                            
                        } else {
                            document.getElementById(idCorrecta + "L").classList.remove("BGgreen")   
                            document.getElementById(selected + "L").classList.remove("BGred")   
                        }

                        if (pregunta < arrayPreguntas.length - 1) {
                            setPregunta(pregunta + 1);
                        } else {
                            compararNota(aciertos, arrayPreguntas.length)
                            setFninished(true)
                        }
                    }

                    const [respuestas, setRespuestas] = useState([]);

                    useEffect(() => {
                        const actual = arrayPreguntas[pregunta];

                        const opciones = [
                            { key: "correct", value: actual.correct },
                            { key: "fakeA", value: actual.fakeA },
                            { key: "fakeB", value: actual.fakeB },
                            { key: "fakeC", value: actual.fakeC }
                        ];

                        const mezcladas = shuffle(opciones);
                        setRespuestas(mezcladas);

                        const indexCorrecta = mezcladas.findIndex(op => op.key === "correct");
                        setIdCorrecta(indexCorrecta);
                    }, [pregunta]);

                    useEffect(() => {
                        const indexCorrecta = respuestas.findIndex(op => op.key === "correct");
                        setIdCorrecta(indexCorrecta);
                    }, [respuestas]);

                    function optionClicked(e) {
                        if (!respondido) {
                            setSelected(Number(e.target.id))
                        }
                    }

                    return (
                        <>
                            {!finished && (
                                <>
                                <h1>{arrayPreguntas[pregunta]["q"]}</h1>
                                <form onSubmit={subminHandler}>
                                    {respuestas.map((resp, i) => (<>
                                        <input onClick={optionClicked} type="radio" name="opt" id={i} value={resp.value}/>
                                        <label class="" id={i + "L"}>{resp.value}</label><br/>
                                    </>))}
                                    <br/>
                                    {!respondido && <button type="submit">Comprobar respuesta</button>}
                                </form>
                                <br/>
                                {respondido && <button type="button" onClick={nextQuestion}>Continuar</button>}
                                <br/>
                                <h3>Pregunta {pregunta + 1} de {arrayPreguntas.length}</h3>
                                </>
                            )}
                            {finished && (
                                <>
                                    <h1>Nota Final: {(aciertos/arrayPreguntas.length*10).toFixed(2)}</h1>
                                    {(aciertos/arrayPreguntas.length*10)>=5 && <h2>El tests ha sido aprobado.</h2>}
                                    {(aciertos/arrayPreguntas.length*10)<5 && <h2>El tests ha sido suspendido.</h2>}
                                    <a href="./index.html" class="betterLink BL">Volver</a>
                                </>
                            )}
                        </>
                    );
                }

                function Escribir(preguntas) {
                    const arrayPreguntas = Object.values(preguntas["preguntas"]);
                    const [pregunta, setPregunta] = useState(0);
                    const [respuestaCorrecta, setRespuestaCorrecta] = useState(arrayPreguntas[0]["correct"])
                    const [finished, setFninished] = useState(false);
                    const [aciertos, setAciertos] = useState(0);
                    const [respondido, setRespondido] = useState(false);

                    function subminHandler(e) {
                        e.preventDefault();
                        
                        if (!respondido) {
                            const formData = new FormData(e.target);
                            const respuesta = formData.get("opt");

                            setRespuestaCorrecta(arrayPreguntas[pregunta]["correct"])

                            if (respuesta.trim() === arrayPreguntas[pregunta]["correct"].trim()) {
                                setAciertos(prev => prev + 1)
                                document.getElementById("opt").classList.add("BGgreen")
                            } else {
                                document.getElementById("opt").classList.add("BGred")
                            }

                            setRespondido(true)
                        }
                    }

                    function nextQuestion() {

                        const seleccionado = document.querySelector('input[name="opt"]');
                        if (seleccionado) {
                            seleccionado.value = "";
                        }

                        document.getElementById("opt").classList.remove("BGgreen")
                        document.getElementById("opt").classList.remove("BGred")

                        setRespondido(false)

                        if (pregunta < arrayPreguntas.length - 1) {
                            setPregunta(pregunta + 1);
                        } else {
                            compararNota(aciertos, arrayPreguntas.length)
                            setFninished(true)
                        }
                    }

                    return (
                        <>
                            {!finished && (
                                <>
                                <h1>{arrayPreguntas[pregunta]["q"]}</h1>
                                <form onSubmit={subminHandler}>
                                    <input autoComplete="off" className="widthForm" type="text" id="opt" name="opt"/>
                                    <br/>
                                    {!respondido && <button type="submit">Comprobar respuesta</button>}
                                </form>
                                <br/>
                                {respondido && <><h2>{respuestaCorrecta}</h2><br/><button type="button" onClick={nextQuestion}>Continuar</button></>}
                                <br/>
                                <h3>Pregunta {pregunta + 1} de {arrayPreguntas.length}</h3>
                                </>
                            )}
                            {finished && (
                                <>
                                    <h1>Nota Final: {(aciertos/arrayPreguntas.length*10).toFixed(2)}</h1>
                                    {(aciertos/arrayPreguntas.length*10)>=5 && <h2>El tests ha sido aprobado.</h2>}
                                    {(aciertos/arrayPreguntas.length*10)<5 && <h2>El tests ha sido suspendido.</h2>}
                                    <a href="./index.html" class="betterLink BL">Volver</a>
                                </>
                            )}
                        </>
                    );
                }

                const introTXT = document.getElementById("introTXT")
                const params = new URLSearchParams(document.location.search);
                const testID = params.get("testID")

                let testFile

                let datos
                let tipo
                let cate

                const mail = getCookie("email")

                fetch("http://localhost:9999/tests/id/" + testID).then((response) => {
                    if (response.status !== 200) {
                        throw new Error("Something went wrong on API server!");
                    }
                    return response.json();
                }).then((response) => {
                    const element = response[0]
                    introTXT.innerHTML = "Ejercicio: " + element.Titulo
                    testFile = element.Ruta
                    cate = element.Tipo
                    fetch(testFile)
                    .then(responseB => responseB.json())
                    .then(data => {
                        datos = data.questions
                        tipo = data.type

                        const container = document.getElementById('root');
                        const root = ReactDOM.createRoot(container);
                        switch (tipo) {
                            case "unaDeCuatro":
                                root.render(<UnaDeCuatro preguntas={datos}/>);
                                break;
                            case "escribir":
                                root.render(<Escribir preguntas={datos}/>);
                            default:
                                break;
                        }
                    })
                    .catch(error => console.error(error));
                })

                async function compararNota(aciertos, preguntas) {
                    const notaLocal = (aciertos/preguntas*10).toFixed(2)
                    const data = {
                        nota: notaLocal,
                        cat: cate
                    }

                    await fetch("http://localhost:9999/results/" + mail + "/" + testID).then(async (responseB) => {
                        if (responseB.status !== 200) {
                            await fetch("http://localhost:9999/results/" + mail + "/" + testID, {method: 'POST', headers: {'Content-Type': 'application/json',},body: JSON.stringify(data)}).then((response) => {
                                return response.json();
                            })
                        }
                        return responseB.json()
                    }).then(async (responseB) => {
                        if (responseB !== null && responseB !== undefined) {
                            const respuesta = responseB[0]
                            const notaNube = respuesta.Nota
                            
                            if (notaLocal > notaNube) {
                                await fetch("http://localhost:9999/results/" + mail + "/" + testID, {method: 'PATCH', headers: {'Content-Type': 'application/json',},body: JSON.stringify(data)}).then((response) => {
                                    return response.json();
                                })
                            }
                        }
                    })
                }



                function getCookie(cname) {
                    let name = cname + "=";
                    let decodedCookie = decodeURIComponent(document.cookie);
                    let ca = decodedCookie.split(';');
                    for(let i = 0; i <ca.length; i++) {
                        let c = ca[i];
                        while (c.charAt(0) == ' ') {
                            c = c.substring(1);
                        }
                        if (c.indexOf(name) == 0) {
                            return c.substring(name.length, c.length);
                        }
                    }
                    return "";
                }
            </script>
        </main>
    </body>
</html>
