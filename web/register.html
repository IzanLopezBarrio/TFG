<!DOCTYPE html>
<html>
    <head>
        <title>Identificarse</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="CSS/style.css">
        <script defer type="module" src="./JS/register.js"></script>
    </head>
    <body class="bgIMG">
        <header class="topNav">
            <a href="#" id="menu" class="hidden fakeLink c1">=</a>
            <!-- <img class="c3 makeItSmall" src="IMG/userIcon.png"> -->
        </header>
        <main class="afterNav">
            <h1 class="introTXT overIMG"><b>Página de registro.</b></h1><br>
            <form class="logInForm center" method="POST" id="registerForm">
                <label class="center">Correo: </label><br>
                <input class="center" type="email" name="email" id="email" required placeholder="Establezca un correo electrónico."><br>
                <label class="center">Contraseña: </label><br>
                <input class="center" type="password" name="passwd" id="passwd" minlength="8" required placeholder="Contraseña..."><br>
                <label class="center">Nombre de Usuario: </label><br>
                <input class="center" type="text" name="userName" id="userName" required placeholder="Introduzca su nombre..."><br>
                <input class="center" type="submit" value="Registrarse">
            </form>

            <a href="logIn.html" class="betterLink BL">Ya tengo una cuenta</a>
        </main>
    </body>
</html>
